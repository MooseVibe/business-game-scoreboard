<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IQ-Provision · Глубинные интервью</title>
  <style>
    :root {
      --accent: #FC6941;
      --bg: #312c2c;
      --header: #1f1f1f;
      --panel: rgba(255, 255, 255, .1);
      --field: rgba(255, 255, 255, .03);
      --line: rgba(255, 255, 255, .1);
      --text: #fff;
      --muted: #9b99a0;
      --danger: #F44D4D;
    }

    * { box-sizing: border-box; }

    html,
    body {
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 20px/1.35 Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      user-select: none;
    }

    .header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
      min-height: 72px;
      padding: 24px 22px;
      background: var(--header);
      border-radius: 0 0 8px 8px;
    }

    .logo svg {
      display: block;
      width: 88px;
      height: auto;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }

    .menu-wrap {
      position: relative;
      justify-self: end;
    }

    .burger {
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      padding: 0;
    }

    .burger:hover { opacity: .75; }

    .menu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      z-index: 4;
      display: grid;
      gap: 6px;
      width: max-content;
      min-width: 190px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #3f3939;
      box-shadow: 0 12px 28px rgba(0, 0, 0, .22);
      opacity: 0;
      pointer-events: none;
      transform-origin: top right;
      transform: translateY(-6px);
      transition: opacity .18s ease, transform .18s ease;
    }

    .menu.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .menu button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      text-align: left;
      white-space: nowrap;
    }

    .menu button:hover { background: rgba(255, 255, 255, .08); }

    .workspace {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 16px;
    }

    .interviews {
      position: fixed;
      top: 96px;
      left: max(16px, calc(50vw - 488px));
      z-index: 3;
      width: 220px;
      padding: 16px;
      border-radius: 14px;
      background: var(--panel);
    }

    .interviews-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .interviews-title {
      font-size: 20px;
      font-weight: 400;
      line-height: 24px;
    }

    .add-interview {
      display: grid;
      place-items: center;
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 4px;
      background: rgba(255, 255, 255, .1);
    }

    .add-interview svg {
      width: 16px;
      height: 16px;
    }

    .add-interview svg path {
      fill: rgba(255, 255, 255, .5);
      transition: fill .14s ease;
    }

    .add-interview:hover svg path {
      fill: #fff;
    }

    .interviews-divider {
      height: .5px;
      margin: 12px 0;
      background: rgba(255, 255, 255, .1);
    }

    .interview-row {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 20px;
      align-items: center;
      gap: 4px;
      min-height: 24px;
    }

    .interview-item {
      width: 100%;
      padding: 4px 8px 4px 0;
      border-radius: 6px;
      color: rgba(255, 255, 255, .5);
      font-size: 16px;
      font-weight: 500;
      line-height: 24px;
      text-align: left;
    }

    .interview-item.active {
      color: var(--accent);
    }

    .interview-item:hover {
      color: #fff;
    }

    .interview-item.active:hover {
      color: var(--accent);
    }

    .question-helper {
      position: fixed;
      top: 96px;
      right: max(16px, calc(50vw - 652px));
      z-index: 2;
      display: none;
      width: 384px;
      max-height: calc(100vh - 120px);
      padding: 24px;
      overflow: auto;
      border-radius: 14px;
      background: var(--panel);
    }

    .question-helper.visible {
      display: block;
    }

    .helper-caption {
      color: rgba(255, 255, 255, .5);
      font-size: 12px;
      font-weight: 400;
      line-height: normal;
    }

    .helper-title {
      margin-top: 4px;
      color: #fff;
      font-size: 16px;
      font-weight: 400;
      line-height: normal;
      white-space: normal;
    }

    .helper-divider {
      height: .5px;
      margin: 12px 0;
      background: rgba(255, 255, 255, .1);
    }

    .helper-questions {
      display: grid;
      gap: 8px;
      margin: 8px 0 0;
      padding-left: 18px;
      color: rgba(255, 255, 255, .8);
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
    }

    .helper-questions li {
      padding-left: 2px;
    }

    .delete-interview {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      padding: 0;
      opacity: 0;
      transition: opacity .14s ease;
    }

    .interview-row:hover .delete-interview,
    .note.deletable:hover .delete-row,
    .note:hover .clear-quote,
    .note:focus-within .clear-quote {
      opacity: 1;
    }

    main {
      width: min(512px, calc(100vw - 32px));
      margin: 18px auto 48px;
      display: grid;
      gap: 8px;
    }

    details.card {
      position: relative;
      border-radius: 14px;
      background: var(--panel);
      overflow: visible;
    }

    summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 24px;
      list-style: none;
      cursor: pointer;
      transition: background .16s ease;
      user-select: none;
    }

    summary::-webkit-details-marker { display: none; }

    summary:has(.respondent-summary-values),
    summary:has(.block-summary-notes) {
      align-items: flex-start;
    }

    .title {
      display: flex;
      gap: 8px;
      min-width: 0;
      font-size: 20px;
      line-height: 24px;
    }

    .title-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .summary-main {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .respondent-summary-values {
      display: block;
      min-width: 0;
      overflow: hidden;
      color: rgba(255, 255, 255, .7);
      font-size: 14px;
      font-weight: 400;
      line-height: 18px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .respondent-summary-values span:not(:last-child) {
      margin-right: 12px;
    }

    details[open]:not(.is-closing) .respondent-summary-values {
      display: none;
    }

    .block-summary-notes {
      display: grid;
      gap: 8px;
    }

    .block-summary-note {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-width: 0;
      color: rgba(255, 255, 255, .7);
      font-size: 14px;
      font-weight: 400;
      line-height: 18px;
    }

    .block-summary-quote {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .block-summary-emotion,
    .block-summary-emotion svg {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    details[open]:not(.is-closing) .block-summary-notes {
      display: none;
    }

    .card-caret,
    .combo-caret {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      transition: transform .2s ease;
    }

    details[open] > summary .card-caret,
    .combo.open .combo-caret {
      transform: rotate(180deg);
    }

    .body {
      max-height: 0;
      overflow: hidden;
      padding: 0 24px;
      transition: max-height .26s ease;
    }

    details[open] .body {
      max-height: none;
      overflow: visible;
    }

    .body-inner {
      display: grid;
      gap: 12px;
      padding-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    input, textarea, .combo-trigger {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--field);
      color: var(--text);
      outline: none;
      padding: 8px 12px;
      font-size: 16px;
      font-weight: 400;
      line-height: 24px;
      transition: border-color .16s ease, background .16s ease, box-shadow .16s ease;
    }

    input, .combo-trigger {
      height: 52px;
      min-height: 52px;
    }
    textarea { min-height: 52px; }

    .field {
      position: relative;
    }

    .field input {
      padding-right: 44px;
    }

    .field.has-value input {
      padding-top: 18px;
      padding-bottom: 6px;
    }

    .combo.has-value .combo-trigger {
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .floating-label {
      position: absolute;
      top: 9px;
      left: 12px;
      z-index: 1;
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
      line-height: 11px;
      pointer-events: none;
    }

    .clear-input {
      position: absolute;
      top: 50%;
      right: 12px;
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      padding: 0;
      opacity: 0;
      transform: translateY(-50%);
      transition: opacity .14s ease;
    }

    .clear-input.empty {
      pointer-events: none;
    }

    .field:hover .clear-input:not(.empty),
    .field:focus-within .clear-input:not(.empty) {
      opacity: 1;
    }

    textarea {
      padding-top: 13px;
      padding-right: 44px;
      padding-bottom: 13px;
      resize: none;
      overflow: hidden;
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--muted);
      opacity: 1;
    }

    input:hover,
    .combo-trigger:hover,
    textarea:hover {
      border-color: rgba(255, 255, 255, .5);
      background: rgba(255, 255, 255, .05);
    }

    input:focus,
    .combo.open .combo-trigger,
    textarea:focus {
      border-color: rgba(255, 255, 255, .75);
      box-shadow: none;
    }

    .combo {
      position: relative;
    }

    .combo.open,
    .suggest.open {
      z-index: 10;
    }

    .combo-trigger {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      user-select: none;
    }

    .combo-trigger.placeholder { color: var(--muted); }
    .combo-label {
      min-width: 0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .combo.has-value .combo-label {
      align-self: flex-end;
      line-height: 24px;
    }
    .combo-trigger svg { flex: 0 0 auto; }

    .combo-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }

    .combo-clear {
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      padding: 0;
      flex: 0 0 auto;
      opacity: 0;
      transition: opacity .14s ease;
    }

    .combo-clear svg path {
      fill: rgba(255, 255, 255, .5);
    }

    .combo:hover .combo-clear,
    .combo.open .combo-clear {
      opacity: 1;
    }

    .combo-menu,
    .suggest-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 5;
      display: grid;
      gap: 4px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #3f3939;
      box-shadow: 0 12px 28px rgba(0, 0, 0, .22);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity .18s ease, transform .18s ease;
    }

    .combo.open .combo-menu,
    .suggest.open .suggest-menu {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .combo-option,
    .suggest-option {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      color: var(--muted);
      text-align: left;
      font-size: 16px;
      font-weight: 500;
    }

    .combo-option:hover,
    .combo-option.active,
    .suggest-option:hover {
      background: rgba(255, 255, 255, .08);
      color: #fff;
    }

    .suggest {
      position: relative;
    }

    .note {
      position: relative;
      display: grid;
      gap: 8px;
    }

    .note .delete-row {
      position: absolute;
      top: -18px;
      right: 0;
      z-index: 2;
      padding: 0;
      color: var(--danger);
      font-size: 12px;
      font-weight: 400;
      line-height: 16px;
      opacity: 0;
      transition: opacity .14s ease;
    }

    .clear-quote {
      position: absolute;
      top: 26px;
      right: 12px;
      z-index: 2;
      display: grid;
      place-items: center;
      width: 20px;
      height: 20px;
      padding: 0;
      opacity: 0;
      transform: translateY(-50%);
      transition: opacity .14s ease;
    }

    .clear-quote.empty {
      pointer-events: none;
    }

    .emotions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }

    .emotion {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 999px;
    }

    .emotion svg {
      width: 40px;
      height: 40px;
    }

    .emotion.active {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .add-row {
      justify-self: start;
      padding: 6px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .add-row:hover { color: #fff; }

    .drop-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      background: rgba(20, 18, 18, .72);
      backdrop-filter: blur(3px);
      pointer-events: none;
    }

    body.dragging-json .drop-overlay {
      display: grid;
    }

    .drop-box {
      width: min(420px, calc(100vw - 32px));
      border: 1px dashed rgba(255, 255, 255, .5);
      border-radius: 16px;
      background: var(--card);
      padding: 28px;
      color: rgba(255, 255, 255, .8);
      font-size: 16px;
      line-height: 22px;
      text-align: center;
    }

    @media (max-width: 1340px) {
      .question-helper {
        display: none;
      }
    }

    @media (max-width: 820px) {
      .header {
        grid-template-columns: auto 1fr auto;
        padding: 20px 16px;
      }

      .logo svg { width: 72px; }
      h1 { font-size: 18px; }
      .grid { grid-template-columns: 1fr; }
      .title { font-size: 20px; }
      .interviews {
        position: static;
        width: min(512px, calc(100vw - 32px));
        margin: 16px auto 0;
      }
    }
  </style>
</head>

    </div>
    <h1>Глубинные интервью</h1>

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));

          saved.open ||= { respondent: true };
          saved.interviews?.forEach(interview => {
            interview.saved = true;

          return saved;

      return { currentId: id, open: { respondent: true }, interviews: [{ id, respondent: {}, notes: {}, saved: true, createdAt: new Date().toISOString() }] };

    function migrateNotesToAssistantBlocks(saved) {
      if (saved.questionBlockSchema === 'assistant-v1') return;
      saved.interviews?.forEach(interview => {
        const oldNotes = interview.notes || {};
        if (saved.questionBlockSchema === 'table-v1') {
          interview.notes = {
            0: oldNotes[0] || [{ quote: '', emotion: '' }],
            1: oldNotes[1] || [{ quote: '', emotion: '' }],
            2: oldNotes[2] || [{ quote: '', emotion: '' }],
            3: [{ quote: '', emotion: '' }],
            4: [{ quote: '', emotion: '' }],

            6: oldNotes[4] || [{ quote: '', emotion: '' }],
            7: oldNotes[5] || [{ quote: '', emotion: '' }]
          };
        }
      });
      const oldOpen = saved.open || {};
      if (saved.questionBlockSchema === 'table-v1') {
        saved.open = {
          respondent: oldOpen.respondent !== false,
          'block-0': !!oldOpen['block-0'],
          'block-1': !!oldOpen['block-1'],
          'block-2': !!oldOpen['block-2'],
          'block-3': false,
          'block-4': false,
          'block-5': !!oldOpen['block-3'],
          'block-6': !!oldOpen['block-4'],
          'block-7': !!oldOpen['block-5']
        };
      }
      if (saved.activeQuestionBlock !== undefined && saved.questionBlockSchema === 'table-v1') {
        const activeMap = { 0: '0', 1: '1', 2: '2', 3: '5', 4: '6', 5: '7' };
        saved.activeQuestionBlock = activeMap[saved.activeQuestionBlock] || '';
      }
      saved.questionBlockSchema = 'assistant-v1';
    }

    function normalizeOpenQuestionBlocks(saved) {
      const openQuestionKeys = Object.entries(saved.open)
        .filter(([key, isOpen]) => key.startsWith('block-') && isOpen)
        .map(([key]) => key);
      if (openQuestionKeys.length <= 1) return;
      const activeKey = saved.activeQuestionBlock !== undefined ? `block-${saved.activeQuestionBlock}` : openQuestionKeys[0];
      const keepKey = openQuestionKeys.includes(activeKey) ? activeKey : openQuestionKeys[0];
      openQuestionKeys.forEach(key => {
        saved.open[key] = key === keepKey;
      });
      saved.activeQuestionBlock = keepKey.replace('block-', '');
    }

    function getRemoteSession() {
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return null;
      const params = new URLSearchParams(window.location.hash.slice(1));
      const sessionId = params.get('session');
      const accessKey = params.get('key');
      if (!sessionId || !accessKey) return null;
      return { sessionId, accessKey };
    }

    async function initRemoteSync() {
      if (!remoteSession) return;
      try {
        const remoteState = await callSupabaseRpc('get_interview_state', {
          p_session_id: remoteSession.sessionId,
          p_access_key: remoteSession.accessKey
        });
        if (remoteState?.interviews?.length) {
          isApplyingRemoteState = true;
          state.interviews = normalizeImportedInterviews(remoteState);
          state.currentId = state.interviews[0].id;
          resetViewState();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          isApplyingRemoteState = false;
          render();
        } else {
          saveRemoteNow();
        }
      } catch {
        isApplyingRemoteState = false;
      }
    }

    function scheduleRemoteSave() {
      if (!remoteSession || isApplyingRemoteState) return;
      window.clearTimeout(remoteSaveTimer);
      remoteSaveTimer = window.setTimeout(saveRemoteNow, REMOTE_SAVE_DELAY);
    }

    async function saveRemoteNow() {
      if (!remoteSession) return;
      try {
        await callSupabaseRpc('save_interview_state', {
          p_session_id: remoteSession.sessionId,
          p_access_key: remoteSession.accessKey,
          p_state: exportData()
        });
      } catch {
      }
    }

    async function callSupabaseRpc(name, body) {
      const response = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${name}`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      if (!response.ok) throw new Error('Supabase request failed');
      if (response.status === 204) return null;
      return response.json();
    }

    function render() {
      document.getElementById('interviews').innerHTML = interviewList();
      document.getElementById('cards').innerHTML = respondentCard() + blocks.map(blockCard).join('');
      renderQuestionHelper();
      document.querySelectorAll('[data-card]').forEach(prepareCard);
      document.querySelectorAll('[data-person]').forEach(input => input.addEventListener('input', () => {
        input.value = normalizeInputValue(input, false);
        current().respondent[input.dataset.person] = input.value;
        current().updatedAt = new Date().toISOString();
        updateClearButton(input);
        updateRespondentSummary();
        save();
        renderInterviewList();
        if (input.dataset.suggest) updateSuggest(input);
      }));
      document.querySelectorAll('[data-person]').forEach(input => input.addEventListener('focus', () => {
        if (!input.dataset.suggest) {
          closeCombos();
          closeSuggests();
        }
      }));
      document.querySelectorAll('[data-clear-person]').forEach(button => button.addEventListener('click', () => {
        current().respondent[button.dataset.clearPerson] = '';
        current().updatedAt = new Date().toISOString();
        save();
        render();
      }));
      document.querySelectorAll('[data-normalize]').forEach(input => {
        const normalize = () => {
          input.value = normalizeInputValue(input, true);
          current().respondent[input.dataset.person] = input.value;
          current().updatedAt = new Date().toISOString();
          updateClearButton(input);
          updateRespondentSummary();
          save();
          renderInterviewList();
        };
        input.addEventListener('blur', normalize);
        input.addEventListener('change', normalize);
      });
      document.querySelectorAll('[data-suggest]').forEach(input => {
        input.addEventListener('focus', () => {
          closeCombos();
          closeSuggests(input);
          updateSuggest(input);
        });
      });
      document.querySelectorAll('[data-suggest-option]').forEach(button => button.addEventListener('mousedown', event => {
        event.preventDefault();
        const input = document.querySelector(`[data-person="${button.dataset.suggestField}"]`);
        input.value = button.dataset.suggestOption;
        current().respondent[button.dataset.suggestField] = input.value;
        current().updatedAt = new Date().toISOString();
        updateClearButton(input);
        updateRespondentSummary();
        button.closest('.suggest').classList.remove('open');
        save();
        renderInterviewList();
      }));
      document.querySelectorAll('[data-combo-toggle]').forEach(button => {
        button.addEventListener('mousedown', event => event.preventDefault());
        button.addEventListener('click', () => {
          const combo = button.closest('.combo');
          const willOpen = !combo.classList.contains('open');
          document.activeElement?.blur();
          closeCombos(button.dataset.comboToggle);
          closeSuggests();
          combo.classList.toggle('open', willOpen);
        });
      });
      document.querySelectorAll('[data-combo-option]').forEach(button => button.addEventListener('mousedown', event => {
        event.preventDefault();
        button.closest('.combo').classList.remove('open');
        current().respondent[button.dataset.combo] = button.dataset.comboOption;
        current().updatedAt = new Date().toISOString();
        save();
        render();
      }));
      document.querySelectorAll('[data-clear-combo]').forEach(button => button.addEventListener('click', event => {
        event.stopPropagation();
        current().respondent[button.dataset.clearCombo] = '';
        current().updatedAt = new Date().toISOString();
        save();
        render();
      }));
      document.querySelectorAll('[data-quote]').forEach(input => input.addEventListener('input', () => {
        current().notes[input.dataset.block][input.dataset.row].quote = input.value;
        current().updatedAt = new Date().toISOString();
        updateQuoteClearButton(input);
        autoGrow(input);
        updateBlockSummary(input.closest('[data-card]'));
        save();
      }));
      document.querySelectorAll('[data-quote]').forEach(autoGrow);
      document.querySelectorAll('[data-clear-quote]').forEach(button => button.addEventListener('click', () => {
        const input = document.querySelector(`[data-block="${button.dataset.block}"][data-row="${button.dataset.clearQuote}"][data-quote]`);
        if (!input) return;
        input.value = '';
        current().notes[button.dataset.block][button.dataset.clearQuote].quote = '';
        current().updatedAt = new Date().toISOString();
        updateQuoteClearButton(input);
        autoGrow(input);
        updateBlockSummary(input.closest('[data-card]'));
        save();
        input.focus();
      }));
      document.querySelectorAll('[data-emotion]').forEach(button => button.addEventListener('click', () => {
        const row = current().notes[button.dataset.block][button.dataset.row];
        row.emotion = row.emotion === button.dataset.emotion ? '' : button.dataset.emotion;
        current().updatedAt = new Date().toISOString();
        save();
        render();
      }));
      document.querySelectorAll('[data-add]').forEach(button => button.addEventListener('click', () => {
        addRow(button.dataset.add);
      }));
      document.querySelectorAll('[data-delete]').forEach(button => button.addEventListener('click', () => {
        deleteRow(button.dataset.block, button.dataset.delete);
      }));
      bindInterviewList();
    }

    function respondentCard() {
      const r = current().respondent;
      const values = [r.name, r.city, r.age, r.experience, r.workplace, r.role].filter(Boolean);
      return `<details class="card" data-card="respondent" ${state.open.respondent !== false ? 'open' : ''}>
        <summary>
          <div class="summary-main">
            <div class="title"><span>1.</span><span class="title-name">Респондент</span></div>
            ${values.length ? `<div class="respondent-summary-values">${values.map(value => `<span>${escapeHtml(value)}</span>`).join('')}</div>` : ''}
          </div>
          ${cardCaret}
        </summary>
        <div class="body">
          <div class="body-inner">
            <div class="grid">
              ${personInput('name', 'Имя', r.name)}
              ${suggestInput('city', 'Город', r.city, 'city', cityOptions)}
              ${combo('age', 'Возраст', ageOptions, r.age)}
              ${combo('experience', 'Опыт в фармации', experienceOptions, r.experience)}
              ${suggestInput('workplace', 'Где работает', r.workplace, 'pharmacy', pharmacyOptions)}
              ${combo('role', 'Должность', roleOptions, r.role)}
            </div>
          </div>
        </div>
      </details>`;
    }

    function prepareCard(card) {
      const summary = card.querySelector('summary');
      const body = card.querySelector('.body');
      if (card.open) {
        body.style.maxHeight = 'none';
        body.style.overflow = 'visible';
      }
      summary.addEventListener('click', event => {
        event.preventDefault();
        card.open ? closeCard(card, body) : openCard(card, body);
      });
    }

    function openCard(card, body) {
      closeOtherQuestionCards(card);
      card.classList.remove('is-closing');
      card.open = true;
      state.open[card.dataset.card] = true;
      setActiveQuestionBlock(card.dataset.card);
      save();
      body.style.overflow = 'hidden';
      body.style.maxHeight = '0px';
      body.offsetHeight;
      body.querySelectorAll('[data-quote]').forEach(autoGrow);
      body.style.maxHeight = `${body.scrollHeight}px`;
      scrollCardIntoView(card, body);
      afterBodyTransition(body, () => {
        if (card.open) {
          body.style.maxHeight = 'none';
          body.style.overflow = 'visible';
        }
      });
    }

    function scrollCardIntoView(card, body) {
      if (!card.dataset.card?.startsWith('block-')) return;
      const rect = card.getBoundingClientRect();
      const topOffset = 88;
      const bottomOffset = 40;
      const expandedBottom = rect.top + card.querySelector('summary').offsetHeight + body.scrollHeight + 20;
      let nextTop = window.scrollY;
      if (rect.top < topOffset) {
        nextTop += rect.top - topOffset;
      } else if (expandedBottom > window.innerHeight - bottomOffset) {
        nextTop += expandedBottom - window.innerHeight + bottomOffset;
      }
      if (nextTop !== window.scrollY) {
        window.scrollTo({ top: nextTop });
      }
    }

    function closeOtherQuestionCards(activeCard) {
      if (!activeCard.dataset.card?.startsWith('block-')) return;
      document.querySelectorAll('[data-card^="block-"][open]').forEach(card => {
        if (card === activeCard) return;
        const body = card.querySelector('.body');
        updateBlockSummary(card);
        card.classList.add('is-closing');
        state.open[card.dataset.card] = false;
        body.style.overflow = 'hidden';
        body.style.maxHeight = `${body.scrollHeight}px`;
        body.offsetHeight;
        body.style.maxHeight = '0px';
        afterBodyTransition(body, () => {
          if (!state.open[card.dataset.card]) {
            card.open = false;
            card.classList.remove('is-closing');
          }
        });
      });
    }

    function closeCard(card, body) {
      updateBlockSummary(card);
      updateRespondentSummary(card);
      card.classList.add('is-closing');
      state.open[card.dataset.card] = false;
      if (card.dataset.card?.startsWith('block-')) {
        state.activeQuestionBlock = '';
        renderQuestionHelper();
      }
      save();
      body.style.overflow = 'hidden';
      body.style.maxHeight = `${body.scrollHeight}px`;
      body.offsetHeight;
      body.style.maxHeight = '0px';
      afterBodyTransition(body, () => {
        if (!state.open[card.dataset.card]) {
          card.open = false;
          card.classList.remove('is-closing');
        }
      });
    }

    function afterBodyTransition(body, callback) {
      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        body.removeEventListener('transitionend', onEnd);
        callback();
      };
      const onEnd = event => {
        if (event.target === body && event.propertyName === 'max-height') finish();
      };
      body.addEventListener('transitionend', onEnd);
      window.setTimeout(finish, 360);
    }

    function personInput(key, placeholder, value = '') {
      return `<div class="field ${value ? 'has-value' : ''}">
        ${value ? `<span class="floating-label">${escapeHtml(placeholder)}</span>` : ''}
        <input data-person="${key}" placeholder="${placeholder}" value="${escapeHtml(value || '')}">
        <button class="clear-input ${value ? '' : 'empty'}" data-clear-person="${key}" aria-label="Очистить поле">${closeIcon}</button>
      </div>`;
    }

    function suggestInput(key, placeholder, value = '', type, options) {
      const filtered = filterOptions(value, options);
      return `<div class="suggest">
        <div class="field ${value ? 'has-value' : ''}">
          ${value ? `<span class="floating-label">${escapeHtml(placeholder)}</span>` : ''}
          <input data-person="${key}" data-suggest="${type}" ${type === 'city' ? 'data-normalize="city"' : ''} placeholder="${placeholder}" value="${escapeHtml(value || '')}">
          <button class="clear-input ${value ? '' : 'empty'}" data-clear-person="${key}" aria-label="Очистить поле">${closeIcon}</button>
        </div>
        <div class="suggest-menu">
          ${filtered.map(option => `<button class="suggest-option" data-suggest-field="${key}" data-suggest-option="${escapeHtml(option)}" type="button">${escapeHtml(option)}</button>`).join('')}
        </div>
      </div>`;
    }

    function combo(key, placeholder, options, value = '') {
      return `<div class="combo ${value ? 'has-value' : ''}" data-combo-root="${key}">
        <button class="combo-trigger ${value ? '' : 'placeholder'}" data-combo-toggle="${key}" type="button">
          ${value ? `<span class="floating-label">${escapeHtml(placeholder)}</span>` : ''}
          <span class="combo-label">${escapeHtml(value || placeholder)}</span>
          <span class="combo-actions">
            ${value ? `<span class="combo-clear" data-clear-combo="${key}" aria-label="Очистить поле">${closeIcon}</span>` : ''}
            ${comboCaret}
          </span>
        </button>
        <div class="combo-menu">
          ${options.map(option => `<button class="combo-option ${option === value ? 'active' : ''}" data-combo="${key}" data-combo-option="${escapeHtml(option)}" type="button">${escapeHtml(option)}</button>`).join('')}
        </div>
      </div>`;
    }

    function blockCard(title, index) {
      const blockIndex = String(index);
      current().notes[blockIndex] ||= [{ quote: '', emotion: '' }];
      const notes = current().notes[blockIndex];
      return `<details class="card" data-card="block-${blockIndex}" ${state.open[`block-${blockIndex}`] ? 'open' : ''}>
        <summary>
          <div class="summary-main">
            <div class="title"><span>${index + 2}.</span><span class="title-name">${escapeHtml(title)}</span></div>
            ${blockSummary(notes)}
          </div>
          ${cardCaret}
        </summary>
        <div class="body">
          <div class="body-inner">
            ${notes.map((row, rowIndex) => noteRow(blockIndex, rowIndex, row, notes.length > 1)).join('')}
            <button class="add-row" data-add="${blockIndex}">+ строка</button>
          </div>
        </div>
      </details>`;
    }

    function setActiveQuestionBlock(cardKey) {
      if (!cardKey?.startsWith('block-')) return;
      state.activeQuestionBlock = cardKey.replace('block-', '');
      renderQuestionHelper();
    }

    function findOpenQuestionBlock(exceptKey = '') {
      const openBlock = Object.entries(state.open)
        .find(([key, isOpen]) => key.startsWith('block-') && key !== exceptKey && isOpen);
      return openBlock ? openBlock[0].replace('block-', '') : '';
    }

    function renderQuestionHelper() {
      const helper = document.getElementById('questionHelper');
      if (!helper) return;
      const activeIndex = getActiveQuestionBlockIndex();
      if (activeIndex === '') {
        helper.classList.remove('visible');
        helper.innerHTML = '';
        return;
      }
      const title = blocks[activeIndex];
      const questions = blockQuestions[activeIndex] || [];
      helper.classList.add('visible');
      helper.innerHTML = `<div class="helper-caption">Блок вопросов</div>
        <div class="helper-title" title="${escapeHtml(title)}">${escapeHtml(title)}</div>
        <div class="helper-divider"></div>
        <div class="helper-caption">Список вопросов</div>
        <ol class="helper-questions">
          ${questions.map(question => `<li>${escapeHtml(question)}</li>`).join('')}
        </ol>`;
    }

    function getActiveQuestionBlockIndex() {
      const activeIndex = state.activeQuestionBlock;
      if (activeIndex !== undefined && state.open[`block-${activeIndex}`]) return activeIndex;
      return findOpenQuestionBlock();
    }

    function blockSummary(notes) {
      const filled = notes.filter(row => row.quote || row.emotion);
      if (!filled.length) return '';
      return `<div class="block-summary-notes">${filled.map(row => `
        <div class="block-summary-note">
          ${row.emotion ? `<span class="block-summary-emotion">${emotions[row.emotion].svg}</span>` : ''}
          ${row.quote ? `<span class="block-summary-quote">${escapeHtml(row.quote)}</span>` : ''}
        </div>
      `).join('')}</div>`;
    }

    function updateBlockSummary(card) {
      if (!card?.dataset.card?.startsWith('block-')) return;
      const blockIndex = card.dataset.card.replace('block-', '');
      const summaryMain = card.querySelector('.summary-main');
      summaryMain.querySelector('.block-summary-notes')?.remove();
      summaryMain.insertAdjacentHTML('beforeend', blockSummary(current().notes[blockIndex] || []));
    }

    function updateRespondentSummary(card = document.querySelector('[data-card="respondent"]')) {
      if (!card || card.dataset.card !== 'respondent') return;
      const summaryMain = card.querySelector('.summary-main');
      const r = current().respondent;
      const values = [r.name, r.city, r.age, r.experience, r.workplace, r.role].filter(Boolean);
      summaryMain.querySelector('.respondent-summary-values')?.remove();
      if (values.length) {
        summaryMain.insertAdjacentHTML('beforeend', `<div class="respondent-summary-values">${values.map(value => `<span>${escapeHtml(value)}</span>`).join('')}</div>`);
      }
    }

    function noteRow(blockIndex, rowIndex, row, deletable) {
      return `<div class="note ${deletable ? 'deletable' : ''}">
        <textarea rows="1" data-block="${blockIndex}" data-row="${rowIndex}" data-quote placeholder="Цитата или короткое наблюдение">${escapeHtml(row.quote || '')}</textarea>
        <button class="clear-quote ${row.quote ? '' : 'empty'}" data-block="${blockIndex}" data-clear-quote="${rowIndex}" type="button" aria-label="Очистить цитату">${closeIcon}</button>
        ${deletable ? `<button class="delete-row" data-block="${blockIndex}" data-delete="${rowIndex}" type="button">удалить</button>` : ''}
        <div class="emotions">
          ${Object.entries(emotions).map(([key, emotion]) => `<button class="emotion ${row.emotion === key ? 'active' : ''}" title="${emotion.label}" data-block="${blockIndex}" data-row="${rowIndex}" data-emotion="${key}">${emotion.svg}</button>`).join('')}
        </div>
      </div>`;
    }

    function addRow(blockIndex) {
      state.open[`block-${blockIndex}`] = true;
      current().notes[blockIndex].push({ quote: '', emotion: '' });
      save();
      render();
      document.querySelector(`[data-block="${blockIndex}"][data-row="${current().notes[blockIndex].length - 1}"][data-quote]`)?.focus();
    }

    function deleteRow(blockIndex, rowIndex) {
      state.open[`block-${blockIndex}`] = true;
      current().notes[blockIndex].splice(Number(rowIndex), 1);
      current().notes[blockIndex] ||= [];
      if (!current().notes[blockIndex].length) current().notes[blockIndex].push({ quote: '', emotion: '' });
      save();
      render();
    }

    function autoGrow(input) {
      input.style.height = 'auto';
      input.style.height = `${Math.max(52, input.scrollHeight + 2)}px`;
    }

    function bindMenu() {
      document.getElementById('menuButton').addEventListener('click', () => document.getElementById('menu').classList.toggle('open'));
      document.getElementById('importJson').addEventListener('click', () => document.getElementById('importJsonInput').click());
      document.getElementById('importJsonInput').addEventListener('change', importJson);
      document.getElementById('exportJson').addEventListener('click', () => download(jsonExportFileName(), JSON.stringify(exportData(), null, 2), 'application/json'));
      document.getElementById('exportCsv').addEventListener('click', exportCsv);
      bindJsonDrop();
      document.addEventListener('click', event => {
        if (!event.target.closest('.menu-wrap')) document.getElementById('menu').classList.remove('open');
        if (!event.target.closest('.combo')) closeCombos();
        if (!event.target.closest('.suggest')) closeSuggests();
      });
    }

    function importJson(event) {
      const file = event.target.files?.[0];
      event.target.value = '';
      if (!file) return;
      importJsonFile(file);
    }

    function bindJsonDrop() {
      document.addEventListener('dragenter', event => {
        if (!hasFileDrop(event.dataTransfer)) return;
        event.preventDefault();
        dragDepth += 1;
        document.body.classList.add('dragging-json');
      });
      document.addEventListener('dragover', event => {
        if (!hasFileDrop(event.dataTransfer)) return;
        event.preventDefault();
      });
      document.addEventListener('dragleave', event => {
        if (!hasFileDrop(event.dataTransfer)) return;
        dragDepth = Math.max(0, dragDepth - 1);
        if (!dragDepth) document.body.classList.remove('dragging-json');
      });
      document.addEventListener('drop', event => {
        if (!hasFileDrop(event.dataTransfer)) return;
        event.preventDefault();
        dragDepth = 0;
        document.body.classList.remove('dragging-json');
        const file = [...event.dataTransfer.files].find(file => file.name.toLowerCase().endsWith('.json'));
        if (file) importJsonFile(file);
      });
    }

    function hasFileDrop(dataTransfer) {
      return !!dataTransfer && Array.from(dataTransfer.types || []).includes('Files');
    }

    function importJsonFile(file) {
      const reader = new FileReader();
      reader.addEventListener('load', () => {
        try {
          const imported = JSON.parse(reader.result);
          const interviews = normalizeImportedInterviews(imported);
          state.interviews = interviews;
          state.currentId = interviews[0].id;
          resetViewState();
          save();
          document.getElementById('menu').classList.remove('open');
          render();
        } catch {
          alert('Не удалось загрузить JSON. Проверь, что это экспорт из ассистента интервьюера.');
        }
      });
      reader.readAsText(file);
    }

    function normalizeImportedInterviews(imported) {
      const source = Array.isArray(imported?.interviews) ? imported.interviews : [];
      if (!source.length) throw new Error('No interviews');
      return source.map((interview, index) => {
        const id = interview.id || makeId();
        const notes = {};
        blocks.forEach((_, blockIndex) => {
          const rows = Array.isArray(interview.notes?.[blockIndex]) ? interview.notes[blockIndex] : [];
          notes[blockIndex] = rows.length ? rows.map(normalizeImportedRow) : [{ quote: '', emotion: '' }];
        });
        return {
          id,
          respondent: interview.respondent || {},
          notes,
          saved: true,
          createdAt: interview.createdAt || new Date().toISOString(),
          updatedAt: interview.updatedAt || interview.createdAt || new Date().toISOString()
        };
      });
    }

    function normalizeImportedRow(row) {
      return {
        quote: row?.quote || '',
        emotion: emotions[row?.emotion] ? row.emotion : ''
      };
    }

    function exportData() {
      return {
        exportedAt: new Date().toISOString(),
        interviews: state.interviews
      };
    }

    function exportCsv() {
      const rows = [['block', 'quote', 'emotion', 'respondent_name', 'age', 'city', 'workplace', 'role', 'experience']];
      state.interviews.forEach(interview => blocks.forEach((title, index) => (interview.notes[index] || []).forEach(row => rows.push([
        title, row.quote || '', emotions[row.emotion]?.label || '', interview.respondent.name || '', interview.respondent.age || '',
        interview.respondent.city || '', interview.respondent.workplace || '', interview.respondent.role || '', interview.respondent.experience || ''
      ]))));
      download('interview.csv', `\uFEFF${rows.map(row => row.map(csvCell).join(',')).join('\n')}`, 'text/csv;charset=utf-8');
    }

    function recordInterview() {
      const id = makeId();
      const now = new Date().toISOString();
      state.currentId = id;
      state.interviews.push({ id, respondent: {}, notes: {}, saved: true, createdAt: now, updatedAt: now });
      resetViewState();
      save();
      document.getElementById('menu').classList.remove('open');
      render();
    }

    function current() {
      return state.interviews.find(interview => interview.id === state.currentId) || state.interviews[0];
    }

    function interviewList() {
      return `<div class="interviews-header">
        <div class="interviews-title">Респонденты</div>
        <button class="add-interview" id="addInterview" type="button" aria-label="Добавить респондента">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"><path d="M8 2C8.27614 2 8.5 2.22386 8.5 2.5V7.5H13.5C13.7761 7.5 14 7.72386 14 8C14 8.27614 13.7761 8.5 13.5 8.5H8.5V13.5C8.5 13.7761 8.27614 14 8 14C7.72386 14 7.5 13.7761 7.5 13.5V8.5H2.5C2.22386 8.5 2 8.27614 2 8C2 7.72386 2.22386 7.5 2.5 7.5H7.5V2.5C7.5 2.22386 7.72386 2 8 2Z"/></svg>
        </button>
      </div>
      <div class="interviews-divider"></div>
      <div class="interviews-list">${state.interviews.map(interview => `
        <div class="interview-row">
          <button class="interview-item ${interview.id === state.currentId ? 'active' : ''}" data-interview="${interview.id}">${escapeHtml(interviewTitle(interview))}</button>
          ${state.interviews.length > 1 ? `<button class="delete-interview" data-delete-interview="${interview.id}" aria-label="Удалить респондента">${closeIcon}</button>` : ''}
        </div>
      `).join('')}</div>`;
    }

    function renderInterviewList() {
      document.getElementById('interviews').innerHTML = interviewList();
      bindInterviewList();
    }

    function bindInterviewList() {
      document.getElementById('addInterview')?.addEventListener('click', recordInterview);
      document.querySelectorAll('[data-interview]').forEach(button => button.addEventListener('click', () => {
        if (state.currentId === button.dataset.interview) return;
        state.currentId = button.dataset.interview;
        resetViewState();
        save();
        render();
      }));
      document.querySelectorAll('[data-delete-interview]').forEach(button => button.addEventListener('click', event => {
        event.stopPropagation();
        deleteInterview(button.dataset.deleteInterview);
      }));
    }

    function deleteInterview(id) {
      state.interviews = state.interviews.filter(interview => interview.id !== id);
      if (!state.interviews.length) {
        const nextId = makeId();
        const now = new Date().toISOString();
        state.interviews.push({ id: nextId, respondent: {}, notes: {}, saved: true, createdAt: now, updatedAt: now });
      }
      if (!state.interviews.some(interview => interview.id === state.currentId)) {
        state.currentId = state.interviews[0].id;
        resetViewState();
      }
      save();
      render();
    }

    function resetViewState() {
      state.open = { respondent: true };
      state.activeQuestionBlock = '';
    }

    function interviewTitle(interview) {
      const index = state.interviews.findIndex(item => item.id === interview.id) + 1;
      return interview.respondent.name || `Респондент ${index}`;
    }

    function closeCombos(except) {
      document.querySelectorAll('.combo.open').forEach(combo => {
        if (combo.dataset.comboRoot !== except) combo.classList.remove('open');
      });
    }

    function closeSuggests(exceptInput) {
      document.querySelectorAll('.suggest.open').forEach(suggest => suggest.classList.remove('open'));
      if (exceptInput) exceptInput.closest('.suggest')?.classList.remove('open');
    }

    function updateSuggest(input) {
      closeCombos();
      const root = input.closest('.suggest');
      const options = input.dataset.suggest === 'city' ? cityOptions : pharmacyOptions;
      const matches = filterOptions(input.value, options);
      root.querySelector('.suggest-menu').innerHTML = matches.map(option => `<button class="suggest-option" data-suggest-field="${input.dataset.person}" data-suggest-option="${escapeHtml(option)}" type="button">${escapeHtml(option)}</button>`).join('');
      root.classList.toggle('open', matches.length > 0);
      root.querySelectorAll('[data-suggest-option]').forEach(button => button.addEventListener('mousedown', event => {
        event.preventDefault();
        input.value = button.dataset.suggestOption;
        current().respondent[input.dataset.person] = input.value;
        current().updatedAt = new Date().toISOString();
        updateClearButton(input);
        updateRespondentSummary();
        root.classList.remove('open');
        save();
        renderInterviewList();
      }));
    }

    function updateClearButton(input) {
      const field = input.closest('.field');
      field?.querySelector('[data-clear-person]')?.classList.toggle('empty', !input.value);
      field?.classList.toggle('has-value', !!input.value);
      field?.querySelector('.floating-label')?.remove();
      if (input.value) {
        field?.insertAdjacentHTML('afterbegin', `<span class="floating-label">${escapeHtml(input.placeholder)}</span>`);
      }
    }

    function updateQuoteClearButton(input) {
      const button = input.closest('.note')?.querySelector('[data-clear-quote]');
      button?.classList.toggle('empty', !input.value);
    }

    function filterOptions(value, options) {
      const query = value.trim().toLowerCase().replaceAll('.', '');
      if (!query) return [];
      const normalized = cityAliases[query] || query;
      return options.filter(option => option.toLowerCase().includes(query) || option.toLowerCase().includes(normalized.toLowerCase())).slice(0, 8);
    }

    function normalizeInputValue(input, final = false) {
      if (input.dataset.person === 'name') return capitalizeWords(input.value);
      if (input.dataset.person === 'city') {
        return final ? normalizeField('city', input.value) : capitalizeCity(input.value);
      }
      return input.value;
    }

    function normalizeField(kind, value) {
      const text = value.trim();
      if (!text) return '';
      if (kind === 'city') return cityAliases[text.toLowerCase().replaceAll('.', '')] || capitalizeCity(text);
      return text;
    }

    function capitalizeWords(value) {
      return value.replace(/(^|[\s-])([a-zа-яё])/gi, (match, before, letter) => before + letter.toLocaleUpperCase('ru-RU'));
    }

    function capitalizeCity(value) {
      return capitalizeWords(value);
    }

    function makeId() {
      return `i${Date.now()}${Math.random().toString(16).slice(2)}`;
    }

    function jsonExportFileName() {
      const now = new Date();
      const dateKey = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
      const exportIndex = nextJsonExportIndex(dateKey);
      return `Список респондентов ${exportIndex} ${formatExportDate(now)}.json`;
    }

    function nextJsonExportIndex(dateKey) {
      let counters = {};
      try {
        counters = JSON.parse(localStorage.getItem(EXPORT_COUNTER_KEY)) || {};
      } catch {
        counters = {};
      }
      counters[dateKey] = (Number(counters[dateKey]) || 0) + 1;
      localStorage.setItem(EXPORT_COUNTER_KEY, JSON.stringify(counters));
      return counters[dateKey];
    }

    function formatExportDate(date) {
      const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
      const parts = [date.getDate(), months[date.getMonth()]];
      if (date.getFullYear() !== new Date().getFullYear()) parts.push(date.getFullYear());
      return parts.join(' ');
    }

    function download(name, content, type) {
      const link = document.createElement('a');
      link.href = URL.createObjectURL(new Blob([content], { type }));
      link.download = name;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function csvCell(value) {
      const text = String(value);
      return /[",\n]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char]);
    }
  </script>
</body>
</html>
